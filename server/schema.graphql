type Query {
    job(id: ID!): Job
    jobs(limit: Int, offset: Int): JobSubList
    company(id: ID!): Company
}
type JobSubList {
    items: [Job!]!
    totalCount: Int!
}

type Mutation {
    createJob(input: CreateJobInput!): Job
    updateJob(input: UpdateJobInput!): Job
    deleteJob(id: ID!): Job
}
type Company{
    id: ID!
    name: String!
    description: String
    jobs: [Job!]!
}
type Job {
  id: ID!
  """The date the job was posted"""
  date: String!
  title: String!
  company: Company!
  description: String
}

input CreateJobInput {
    title: String!
    description: String
}
input UpdateJobInput {
    id: ID!
    title: String!
    description: String
}